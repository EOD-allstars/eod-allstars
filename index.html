<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>EOD Allstars · Fullout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f0efed;--surface:#f7f6f4;--panel:#ebebea;--border:#d8d7d5;--stone:#8a8a88;--ink:#1a1a1a;--ink-lt:#4a4a48;--red:#b33a2d;--white:#fafafa;--green:#2d7a52;--orange:#c47a1a;}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;}
body{font-family:'DM Sans',sans-serif;color:var(--ink);}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;}
.screen{display:none;width:100%;flex:1;min-height:0;overflow:hidden;}
.screen.active{display:flex;flex-direction:column;}
/* TOPBAR */
.topbar{background:var(--ink);display:flex;align-items:center;padding:0 20px;height:56px;flex-shrink:0;}
.topbar-logo{font-family:'DM Serif Display',serif;font-size:20px;font-style:italic;color:#f7f6f4;}
.topbar-sub{font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#555;margin-left:10px;}
.sync-wrap{margin-left:auto;display:flex;align-items:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#444;flex-shrink:0;}
.sync-dot.ok{background:#4a9d6f;}.sync-dot.err{background:#b33a2d;}.sync-dot.busy{background:#c4a44a;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-lbl{font-size:9px;color:#555;}
/* BACKBAR */
.backbar{background:var(--ink);display:flex;align-items:center;padding:0 16px;height:44px;flex-shrink:0;}
.back-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:#666;padding:0;}
.back-btn:hover{color:#bbb;}
.backbar-title{font-family:'DM Serif Display',serif;font-size:16px;font-style:italic;color:#ccc;margin-left:12px;}
.backbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
/* HOME */
.home-scroll{flex:1;overflow-y:auto;padding:28px 24px 60px;}
.home-hd{font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--stone);margin-bottom:16px;}
.teams-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.team-tile{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:22px 14px 16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;transition:all .15s;}
.team-tile:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.07);border-color:#c8c7c5;}
.team-abbr{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:17px;font-style:italic;color:var(--ink);font-weight:600;}
.team-name{font-size:12px;font-weight:600;color:var(--ink);line-height:1.3;}
.team-meta{font-size:10px;color:var(--stone);}
.all-tile{background:var(--ink);border:1px solid #2a2a2a;border-radius:14px;padding:22px 14px 16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;transition:all .15s;}
.all-tile:hover{transform:translateY(-2px);background:#252525;}
.all-icon{width:66px;height:66px;border-radius:50%;background:#222;border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:26px;}
/* TEAM */
.team-body{flex:1;display:flex;min-height:0;}
.team-nav{width:180px;flex-shrink:0;background:var(--ink);padding:12px;display:flex;flex-direction:column;}
.tnav-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#555;text-align:left;padding:9px 0;border-bottom:1px solid #222;width:100%;}
.tnav-btn.active{color:#ccc;}
.team-content{flex:1;display:flex;min-height:0;overflow:hidden;}
/* FO */
.fo-panel{width:180px;flex-shrink:0;background:#111;padding:12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;border-right:1px solid #222;}
.fo-main{flex:1;overflow-y:auto;background:var(--bg);padding:18px 22px 60px;}
.fo-session-row{background:rgba(255,255,255,.04);border:1px solid #222;border-radius:8px;padding:9px 11px;cursor:pointer;margin-bottom:6px;}
.fo-session-row.sel,.fo-session-row:hover{background:rgba(255,255,255,.09);border-color:#3a3a3a;}
.fo-session-date{font-family:'DM Serif Display',serif;font-size:13px;font-style:italic;color:#bbb;}
.fo-session-cnt{font-size:10px;color:#444;margin-top:2px;}
.new-fo-btn{width:100%;padding:8px;background:rgba(255,255,255,.06);border:1px solid #2a2a2a;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:#aaa;cursor:pointer;}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.card-hd{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--border);}
.card-title{font-family:'DM Serif Display',serif;font-size:17px;font-style:italic;}
.card-body{padding:14px;display:flex;flex-direction:column;gap:12px;}
.fo-lbl{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);margin-bottom:5px;}
.fo-inp{width:100%;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;}
.fo-ta{width:100%;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;resize:vertical;line-height:1.5;}
/* DEDUCTIONS */
.ded-row{display:flex;flex-direction:column;gap:4px;padding:8px 10px;border-bottom:1px solid var(--border);}
.ded-top{display:flex;align-items:center;gap:6px;}
.ded-tag{background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--ink-lt);white-space:nowrap;}
.ded-pts{font-size:11px;font-weight:700;color:var(--red);}
.ded-rem{background:none;border:none;cursor:pointer;color:var(--stone);font-size:11px;padding:2px 6px;margin-left:auto;}
.ded-rem:hover{color:var(--red);}
.ded-desc{width:100%;padding:5px 8px;background:var(--panel);border:1px solid var(--border);border-radius:5px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--ink);outline:none;}
.ded-total{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--panel);border-top:1px solid var(--border);}
.add-ded-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--stone);cursor:pointer;}
.ded-menu{position:absolute;top:100%;left:0;z-index:200;background:var(--white);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);min-width:230px;overflow:hidden;margin-top:4px;}
.ded-mhd{padding:5px 12px;font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--stone);background:var(--panel);border-bottom:1px solid var(--border);}
.ded-mopt{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--ink);display:flex;justify-content:space-between;border-bottom:1px solid var(--border);}
.ded-mopt:last-child{border-bottom:none;}
.ded-mopt:hover{background:var(--panel);}
/* PROBLEMS */
.prob-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);}
.prob-item:last-child{border-bottom:none;}
.prob-chk{width:18px;height:18px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .12s;}
.prob-chk.done{background:var(--green);border-color:var(--green);}
.prob-chk.done::after{content:'';width:4px;height:8px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg);display:block;margin-top:-2px;}
.prob-txt{flex:1;font-size:12px;color:var(--ink);}
.prob-item.done .prob-txt{text-decoration:line-through;color:var(--stone);}
.prob-rem{background:none;border:none;cursor:pointer;color:var(--stone);font-size:10px;padding:2px 4px;margin-left:auto;}
/* CHECKLIST */
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;}
.cl-item.done{opacity:.55;}
.cl-chk{width:20px;height:20px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.cl-chk.ticked{background:var(--green);border-color:var(--green);}
.cl-chk.ticked::after{content:'';width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg);display:block;margin-top:-2px;}
.cl-txt{flex:1;font-size:12px;line-height:1.4;}
.cl-item.done .cl-txt{text-decoration:line-through;color:var(--stone);}
.cl-rem{background:none;border:none;cursor:pointer;color:var(--stone);font-size:11px;padding:2px 6px;}
.add-row{display:flex;gap:8px;margin-bottom:14px;}
.add-inp{flex:1;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;}
.add-btn{padding:8px 14px;background:var(--ink);color:white;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
/* ANALYTICS */
.a-title{font-family:'DM Serif Display',serif;font-size:20px;font-style:italic;margin-bottom:3px;}
.a-sub{font-size:11px;color:var(--stone);margin-bottom:12px;}
.pct-bar-wrap{background:var(--border);border-radius:100px;height:5px;overflow:hidden;flex:1;min-width:40px;}
.pct-bar{height:100%;border-radius:100px;}
.fo-s-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.fo-s-card-hd{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:var(--panel);border-bottom:1px solid var(--border);}
.fo-fo-hd{padding:6px 14px;background:var(--ink);color:#ddd;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border-top:1px solid #333;}
.fo-ded-line{padding:7px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--ink-lt);}
.del-btn{background:none;border:none;cursor:pointer;color:var(--stone);font-size:11px;padding:4px 8px;}
.del-btn:hover{color:var(--red);}
.no-data{font-size:12px;color:var(--stone);font-style:italic;padding:8px 0;}
/* RESPONSIVE */
@media(max-width:680px){
  .teams-grid{grid-template-columns:repeat(2,1fr);}
  .team-body{flex-direction:column;}
  .team-nav{width:100%;flex-direction:row;max-height:50px;overflow-x:auto;}
  .tnav-btn{border-bottom:none;border-right:1px solid #222;white-space:nowrap;padding:8px 10px;}
  .fo-panel{width:100%;max-height:34vh;}
  .team-content{flex-direction:column;}
}
@media(min-width:681px) and (max-width:1024px){.teams-grid{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="home" class="screen active">
  <div class="topbar">
    <span class="topbar-logo">EOD Allstars</span>
    <span class="topbar-sub">fullout tracker</span>
    <div class="sync-wrap">
      <div class="sync-dot busy" id="home-sync-dot"></div>
      <span class="sync-lbl" id="home-sync-lbl">connecting</span>
    </div>
  </div>
  <div class="home-scroll">
    <div class="home-hd">select your team</div>
    <div class="teams-grid" id="teams-grid"></div>
  </div>
</div>

<!-- TEAM VIEW -->
<div id="team-view" class="screen">
  <div class="backbar">
    <button class="back-btn" onclick="goHome()">&#8592; all teams</button>
    <span class="backbar-title" id="team-view-title"></span>
    <div class="backbar-right">
      <div class="sync-dot" id="team-sync-dot"></div>
      <span class="sync-lbl" id="team-sync-lbl"></span>
    </div>
  </div>
  <div class="team-body">
    <div class="team-nav">
      <button class="tnav-btn active" onclick="teamTab('fullouts',this)">fullouts</button>
      <button class="tnav-btn" onclick="teamTab('analytics',this)">analytics</button>
      <button class="tnav-btn" onclick="teamTab('checklist',this)">checklist</button>
    </div>
    <div class="team-content" id="team-content"></div>
  </div>
</div>

<!-- ALL ANALYTICS -->
<div id="all-analytics" class="screen">
  <div class="backbar">
    <button class="back-btn" onclick="goHome()">&#8592; all teams</button>
    <span class="backbar-title">all teams analytics</span>
  </div>
  <div style="flex:1;overflow-y:auto;padding:20px 24px 60px;" id="all-a-content"></div>
</div>

</div>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyA-gEiXgNxeJM369CuCzCCvHsY0V4Ge0Ps",
  authDomain:"eod-allstars.firebaseapp.com",
  projectId:"eod-allstars",
  storageBucket:"eod-allstars.appspot.com",
  messagingSenderId:"951318632359",
  appId:"1:951318632359:web:d9cb67ded57f9b26148882"
});
const db=firebase.firestore();

const TEAMS=[
  {id:"tiny_diamonds",name:"Tiny Diamonds",abbr:"TD",color:"#f0d4e4",athletes:["Zara","Lily","Mia","Sophie","Grace","Ella","Chloe"]},
  {id:"lil_leopards",name:"Lil Leopards",abbr:"LL",color:"#ddd4f0",athletes:["Ava","Ruby","Isla","Freya","Poppy","Daisy","Rose"]},
  {id:"cheetahs",name:"Cheetahs",abbr:"CH",color:"#d4e4f0",athletes:["Emma","Olivia","Amelia","Charlotte","Harper","Luna","Willow"]},
  {id:"ibk",name:"IBK",abbr:"IBK",color:"#d4f0e4",athletes:["Nova","Stella","Aurora","Ivy","Pearl","Jade","Sage"]},
  {id:"lady_lynx",name:"Lady Lynx",abbr:"LLX",color:"#f0e4d4",athletes:["Skye","River","Quinn","Blair","Reese","Sloane","Teagan"]},
  {id:"savage_katz",name:"Savage Katz",abbr:"SK",color:"#f0d4d4",athletes:["Brooke","Taylor","Jordan","Morgan","Casey","Riley","Avery"]},
  {id:"claw_katz",name:"Claw Katz",abbr:"CK",color:"#d4f0d4",athletes:["Paige","Hailey","Bailey","Kaylee","Hayley","Miley","Kylie"]},
  {id:"diamonds",name:"Diamonds",abbr:"DIA",color:"#f0ecd4",athletes:["Scarlett","Violet","Iris","Danika","Petra","Sonia","Vera"]},
  {id:"pink_panthers",name:"Pink Panthers",abbr:"PP",color:"#f8d8ec",athletes:["Maya","Layla","Kayla","Nadia","Talia","Delia","Celia"]}
];

const DED_TYPES=[
  {cat:"ROUTINE INFRACTIONS",items:[{label:"Athlete Fall",pts:0.25},{label:"Building Bobble",pts:0.40},{label:"Building Fall",pts:0.75},{label:"Major Building Fall",pts:1.25}]},
  {cat:"RULE VIOLATIONS",items:[{label:"Building safety violation",pts:1.0}]}
];

let foCache={},clCache={};
let curTeamId=null,curFoId=null,curTeamTab="fullouts",activeDedDD=null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmtShort(s){if(!s)return"--";return new Date(s+"T12:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"});}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function getTeam(id){return TEAMS.find(t=>t.id===id);}
function pctCol(p){return p>=90?"#2d7a52":p>=75?"#c47a1a":"#b33a2d";}
function foCol(tid){return db.collection("teams").doc(tid).collection("fulloutSessions");}
function clCol(tid){return db.collection("teams").doc(tid).collection("checklist");}
function getFo(){return(foCache[curTeamId]||[]).find(s=>s.id===curFoId);}
function sd(id,state,lbl){const d=document.getElementById(id+"-sync-dot"),l=document.getElementById(id+"-sync-lbl");if(d)d.className="sync-dot "+(state==="ok"?"ok":state==="err"?"err":state==="busy"?"busy":"");if(l)l.textContent=lbl||"";}

document.addEventListener("click",e=>{if(activeDedDD&&!activeDedDD.contains(e.target)){activeDedDD.querySelector(".ded-menu").style.display="none";activeDedDD=null;}});

// ── LIVE SYNC ──
function startSync(){
  sd("home","busy","connecting");
  let loaded=0;
  TEAMS.forEach(t=>{
    foCol(t.id).orderBy("date","desc").onSnapshot(snap=>{
      foCache[t.id]=snap.docs.map(d=>d.data());
      loaded++;if(loaded>=TEAMS.length)sd("home","ok","live");
      renderHome();
      if(curTeamId===t.id&&curTeamTab==="fullouts"){renderFoList();renderFoRight();}
      if(curTeamId===t.id&&curTeamTab==="analytics")renderTeamAnalytics();
    },()=>sd("home","err","offline"));
    clCol(t.id).orderBy("created_at","asc").onSnapshot(snap=>{
      clCache[t.id]=snap.docs.map(d=>d.data());
      if(curTeamId===t.id&&curTeamTab==="checklist")renderChecklist();
    });
  });
}

// ── HOME ──
function renderHome(){
  const grid=document.getElementById("teams-grid");
  let html=TEAMS.map(t=>{
    const sessions=foCache[t.id]||[];
    const totalFo=sessions.reduce((s,x)=>s+(x.fullouts?x.fullouts.length:0),0);
    return `<div class="team-tile" onclick="openTeam('${t.id}')">
      <div class="team-abbr" style="background:${t.color}">${esc(t.abbr)}</div>
      <div class="team-name">${esc(t.name)}</div>
      <div class="team-meta">${sessions.length} sessions &middot; ${totalFo} fullouts</div>
    </div>`;
  }).join("");
  html+=`<div class="all-tile" onclick="openAllAnalytics()">
    <div class="all-icon">&#9733;</div>
    <div style="font-size:12px;font-weight:600;color:#ddd;line-height:1.3">All Teams Analytics</div>
    <div style="font-size:10px;color:#555">compare &amp; overview</div>
  </div>`;
  grid.innerHTML=html;
}
function goHome(){showScreen("home");renderHome();}

// ── TEAM VIEW ──
function openTeam(tid){
  curTeamId=tid;curFoId=null;curTeamTab="fullouts";
  document.getElementById("team-view-title").textContent=getTeam(tid).name;
  document.querySelectorAll(".tnav-btn").forEach(b=>b.classList.remove("active"));
  document.querySelector(".tnav-btn").classList.add("active");
  showScreen("team-view");
  renderTeamContent();
}
function teamTab(tab,btn){
  curTeamTab=tab;
  document.querySelectorAll(".tnav-btn").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
  renderTeamContent();
}
function renderTeamContent(){
  if(curTeamTab==="fullouts") renderFoTab();
  else if(curTeamTab==="analytics") renderTeamAnalytics();
  else if(curTeamTab==="checklist") renderChecklistTab();
}

// ── FULLOUT TAB ──
function renderFoTab(){
  document.getElementById("team-content").innerHTML=`
    <div class="fo-panel">
      <button class="new-fo-btn" onclick="addFoSession()">+ new session</button>
      <div id="fo-session-list"></div>
    </div>
    <div class="fo-main" id="fo-main">
      <div class="no-data" style="padding:40px 0;text-align:center">Select a session or create a new one.</div>
    </div>`;
  renderFoList();
}
function renderFoList(){
  const list=document.getElementById("fo-session-list");if(!list)return;
  const sessions=foCache[curTeamId]||[];
  if(!sessions.length){list.innerHTML='<div style="font-size:11px;color:#444;font-style:italic;padding:8px 0">No sessions yet.</div>';return;}
  list.innerHTML=sessions.map(s=>`<div class="fo-session-row${s.id===curFoId?" sel":""}" onclick="openFoSession('${s.id}')">
    <div class="fo-session-date">${fmtShort(s.date)}</div>
    <div class="fo-session-cnt">${s.fullouts?s.fullouts.length:0} fullout${s.fullouts&&s.fullouts.length!==1?"s":""}</div>
  </div>`).join("");
}
async function addFoSession(){
  const s={id:uid(),date:new Date().toISOString().split("T")[0],notes:"",fullouts:[]};
  sd("team","busy","saving");
  try{await foCol(curTeamId).doc(s.id).set(s);sd("team","ok","saved");openFoSession(s.id);}
  catch{sd("team","err","failed");}
}
function openFoSession(id){curFoId=id;renderFoList();renderFoRight();}
async function saveSession(s){s.updated_at=new Date().toISOString();sd("team","busy","saving");try{await foCol(curTeamId).doc(s.id).set(s);sd("team","ok","saved");}catch{sd("team","err","failed");}}

function renderFoRight(){
  const el=document.getElementById("fo-main");if(!el)return;
  const session=getFo();
  if(!session){el.innerHTML='<div class="no-data" style="padding:40px 0;text-align:center">Select a session or create a new one.</div>';return;}
  const team=getTeam(curTeamId);
  const athletes=team.athletes||[];

          </div>
          <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid ${pyH?"#4a9d6f":"var(--border)"};border-radius:7px;cursor:pointer;background:${pyH?"#f0faf5":"transparent"};margin-top:8px" onclick="togglePH(${fi})">

      <div>

// ── FO ACTIONS ──
function toggleDD(fi){const m=document.getElementById("ded-menu-"+fi),w=document.getElementById("dd-wrap-"+fi);if(!m)return;const open=m.style.display!=="none";document.querySelectorAll(".ded-menu").forEach(x=>x.style.display="none");activeDedDD=null;if(!open){m.style.display="block";activeDedDD=w;}}
async function updateFoField(f,v){const s=getFo();if(!s)return;s[f]=v;await saveSession(s);}
async function updateFoVideo(fi,v){const s=getFo();if(!s)return;s.fullouts[fi].videoUrl=v;await saveSession(s);}
async function updateDedDesc(fi,di,v){const s=getFo();if(!s)return;s.fullouts[fi].deductions[di].desc=v;await saveSession(s);}
async function addFullout(){
  const s=getFo();if(!s)return;const t=getTeam(curTeamId);
  s.fullouts=s.fullouts||[];
  s.fullouts.push({id:uid(),deductions:[],problems:[],videoUrl:"",stunt1Hits:Object.fromEntries((t.athletes||[]).map(n=>[n,false])),stunt2Hits:Object.fromEntries((t.athletes||[]).map(n=>[n,false])),pyramidHit:false});
  await saveSession(s);renderFoRight();
}
async function removeFullout(fi){if(!confirm("Remove this fullout?"))return;const s=getFo();if(!s)return;s.fullouts.splice(fi,1);await saveSession(s);renderFoRight();}
async function addDed(fi,label,pts){const s=getFo();if(!s)return;s.fullouts[fi].deductions=s.fullouts[fi].deductions||[];s.fullouts[fi].deductions.push({label,pts,desc:""});document.querySelectorAll(".ded-menu").forEach(m=>m.style.display="none");activeDedDD=null;await saveSession(s);renderFoRight();}
async function removeDed(fi,di){const s=getFo();if(!s)return;s.fullouts[fi].deductions.splice(di,1);await saveSession(s);renderFoRight();}
async function addProb(fi){
  const inp=document.getElementById("prob-inp-"+fi);const txt=inp?inp.value.trim():"";if(!txt)return;
  const s=getFo();if(!s)return;
  const item={id:uid(),text:txt,done:false,created_at:new Date().toISOString(),source:"fullout"};
  await clCol(curTeamId).doc(item.id).set(item);
  s.fullouts[fi].problems=s.fullouts[fi].problems||[];
  s.fullouts[fi].problems.push({id:item.id,text:txt,done:false});
  await saveSession(s);renderFoRight();
}
async function removeProb(fi,pi){const s=getFo();if(!s)return;s.fullouts[fi].problems.splice(fi,1);await saveSession(s);renderFoRight();}
async function toggleProb(fi,pi){
  const s=getFo();if(!s)return;
  s.fullouts[fi].problems[pi].done=!s.fullouts[fi].problems[pi].done;
  const cl=(clCache[curTeamId]||[]).find(i=>i.id===s.fullouts[fi].problems[pi].id);
  if(cl){cl.done=s.fullouts[fi].problems[pi].done;await clCol(curTeamId).doc(cl.id).set(cl);}
  await saveSession(s);renderFoRight();
}
async function toggleSH(fi,field,name){const s=getFo();if(!s)return;s.fullouts[fi][field]=s.fullouts[fi][field]||{};s.fullouts[fi][field][name]=!s.fullouts[fi][field][name];await saveSession(s);renderFoRight();}
async function togglePH(fi){const s=getFo();if(!s)return;s.fullouts[fi].pyramidHit=!s.fullouts[fi].pyramidHit;await saveSession(s);renderFoRight();}
async function delFoSession(){if(!confirm("Delete this session?"))return;await foCol(curTeamId).doc(curFoId).delete();curFoId=null;document.getElementById("fo-main").innerHTML='<div class="no-data" style="padding:40px 0;text-align:center">Session deleted.</div>';}

// ── CHECKLIST ──
function renderChecklistTab(){
  document.getElementById("team-content").innerHTML=`<div style="flex:1;overflow-y:auto;padding:20px 24px 60px">
    <div style="font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--stone);margin-bottom:12px">problems / things to fix</div>
    <div class="add-row"><input class="add-inp" id="cl-inp" placeholder="Add a problem..." onkeydown="if(event.key==='Enter')addCLItem()"/><button class="add-btn" onclick="addCLItem()">+ add</button></div>
    <div id="cl-list"></div>
  </div>`;
  renderChecklist();
}
function renderChecklist(){
  const list=document.getElementById("cl-list");if(!list)return;
  const items=clCache[curTeamId]||[];
  if(!items.length){list.innerHTML='<div class="no-data">No items yet.</div>';return;}
  list.innerHTML=items.map(item=>`<div class="cl-item${item.done?" done":""}"><div class="cl-chk${item.done?" ticked":""}" onclick="toggleCL('${item.id}')"></div><span class="cl-txt">${esc(item.text)}</span><button class="cl-rem" onclick="removeCL('${item.id}')">x</button></div>`).join("");
}
async function addCLItem(){const inp=document.getElementById("cl-inp");const txt=inp.value.trim();if(!txt)return;inp.value="";const id=uid();await clCol(curTeamId).doc(id).set({id,text:txt,done:false,created_at:new Date().toISOString()});}
async function toggleCL(id){const i=(clCache[curTeamId]||[]).find(x=>x.id===id);if(!i)return;i.done=!i.done;await clCol(curTeamId).doc(id).set(i);}
async function removeCL(id){if(!confirm("Remove?"))return;await clCol(curTeamId).doc(id).delete();}

// ── TEAM ANALYTICS ──
function renderTeamAnalytics(){
  const team=getTeam(curTeamId);
  const sessions=foCache[curTeamId]||[];
  let totalFo=0;sessions.forEach(s=>{if(s.fullouts)totalFo+=s.fullouts.length;});
  const sorted=[...sessions].filter(s=>s.date).sort((a,b)=>a.date.localeCompare(b.date));

  let html=`<div style="flex:1;overflow-y:auto;padding:20px 24px 60px">`;
  html+=`<div class="a-title">stunt group hit rates</div><div class="a-sub">across ${totalFo} fullouts</div>`;

  if(totalFo&&team.athletes&&team.athletes.length){
    html+=`<table style="width:100%;border:1px solid var(--border);border-radius:10px;border-collapse:collapse;overflow:hidden;margin-bottom:18px">
      <thead><tr style="background:var(--ink)">
        <th style="padding:6px 10px;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:white;text-align:left">group</th>
        <th colspan="2" style="padding:6px 8px;font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:white;background:#2a2a2a">1st stunt</th>
        <th colspan="2" style="padding:6px 8px;font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:white;background:#1a1a1a">2nd stunt</th>
        <th colspan="2" style="padding:6px 8px;font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:white;background:#111">combined</th>
      </tr></thead>
      <tbody>`;
    team.athletes.forEach(name=>{
      let s1h=0,s2h=0;
      sessions.forEach(s=>{if(s.fullouts)s.fullouts.forEach(fo=>{if(fo.stunt1Hits&&fo.stunt1Hits[name])s1h++;if(fo.stunt2Hits&&fo.stunt2Hits[name])s2h++;});});
      const p1=Math.round((s1h/totalFo)*100),p2=Math.round((s2h/totalFo)*100);
      const cH=s1h+s2h,cT=totalFo*2,pC=Math.round((cH/cT)*100);
      function bc(h,t,p){return`<td style="padding:6px 8px;text-align:center;font-size:11px">${h}/${t}</td><td style="padding:6px 8px;min-width:80px"><div style="display:flex;align-items:center;gap:4px"><div class="pct-bar-wrap"><div class="pct-bar" style="width:${p}%;background:${pctCol(p)}"></div></div><span style="font-size:10px;font-weight:700;color:${pctCol(p)}">${p}%</span></div></td>`;}
      html+=`<tr style="border-top:1px solid var(--border)"><td style="padding:6px 10px;font-size:11px;font-weight:500">${esc(name)}'s group</td>${bc(s1h,totalFo,p1)}${bc(s2h,totalFo,p2)}${bc(cH,cT,pC)}</tr>`;
    });
    html+=`</tbody></table>`;
  } else {html+='<div class="no-data">No fullout data yet.</div>';}

  let pyH=0,pyT=0;sessions.forEach(s=>{if(s.fullouts)s.fullouts.forEach(fo=>{pyT++;if(fo.pyramidHit)pyH++;});});
  if(pyT>0){
    const pyP=Math.round((pyH/pyT)*100);
    html+=`<div class="a-title" style="margin-top:16px">pyramid hit rate</div><div class="a-sub">${pyH}/${pyT} fullouts</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:16px;margin-bottom:18px">
      <div class="pct-bar-wrap" style="flex:1;height:8px"><div class="pct-bar" style="width:${pyP}%;background:${pctCol(pyP)}"></div></div>
      <span style="font-size:22px;font-weight:700;color:${pctCol(pyP)}">${pyP}%</span>
    </div>`;
  }

  html+=`<div class="a-title">deductions over time</div><div class="a-sub">per session, broken down by fullout</div>`;
  html+=sorted.map(s=>{
    const tot=s.fullouts?s.fullouts.reduce((sum,fo)=>sum+(fo.deductions?fo.deductions.reduce((a,d)=>a+(parseFloat(d.pts||d.points)||0),0):0),0):0;
    return`<div class="fo-s-card"><div class="fo-s-card-hd"><span style="font-family:'DM Serif Display',serif;font-size:15px;font-style:italic">${fmtShort(s.date)}</span><span style="font-size:13px;font-weight:700;color:${tot>0?"var(--red)":"#4a9d6f"}">${tot>0?"-"+tot.toFixed(2):"clean"}</span></div>
    ${s.fullouts&&s.fullouts.length?s.fullouts.map((fo,fi)=>{
      const foDed=fo.deductions?fo.deductions.reduce((a,d)=>a+(parseFloat(d.pts||d.points)||0),0):0;
      return`<div class="fo-fo-hd">fullout ${String(fi+1).padStart(2,"0")} &mdash; ${foDed>0?"-"+foDed.toFixed(2):"no deductions"}</div>
      ${fo.deductions&&fo.deductions.length?fo.deductions.map(d=>`<div class="fo-ded-line"><span style="color:var(--red);font-weight:600">-${parseFloat(d.pts||d.points).toFixed(2)}</span> ${esc(d.label)}${d.desc?` <span style="color:var(--stone)">&mdash; ${esc(d.desc)}</span>`:""}</div>`).join(""):'<div class="fo-ded-line" style="color:var(--stone)">No deductions</div>'}`;
    }).join(""):""}
    </div>`;
  }).join("");

  html+=`</div>`;
  document.getElementById("team-content").innerHTML=html;
}

      const totalDed=sessions.reduce((sum,s)=>sum+(s.fullouts?s.fullouts.reduce((a,fo)=>a+(fo.deductions?fo.deductions.reduce((x,d)=>x+(parseFloat(d.pts||d.points)||0),0):0),0):0),0);
      const avgDed=sessions.length>0?(totalDed/sessions.length):0;

  html+=`<div style="width:100%;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px">
    <div style="display:grid;grid-template-columns:160px 1fr 60px;background:var(--panel);padding:7px 14px;border-bottom:1px solid var(--border)">

    ${TEAMS.map((team,i)=>{
      const sessions=foCache[team.id]||[];
      let hits=0,total=0;
      sessions.forEach(s=>{if(s.fullouts)s.fullouts.forEach(fo=>{(team.athletes||[]).forEach(name=>{if(fo.stunt1Hits&&fo.stunt1Hits[name])hits++;if(fo.stunt2Hits&&fo.stunt2Hits[name])hits++;total+=2;});});});
      const pct=total>0?Math.round((hits/total)*100):null;
      const bg=i%2===0?"var(--surface)":"transparent";
      return`<div style="display:grid;grid-template-columns:160px 1fr 60px;padding:8px 14px;border-top:1px solid var(--border);align-items:center;background:${bg}">
        <span style="font-size:12px;font-weight:600">${esc(team.name)}</span>
        <div style="display:flex;align-items:center;gap:8px;padding-right:16px">${pct!==null?`<div class="pct-bar-wrap"><div class="pct-bar" style="width:${pct}%;background:${pctCol(pct)}"></div></div>`:'<span style="font-size:11px;color:var(--stone)">no data</span>'}</div>
        <span style="font-size:12px;font-weight:700;text-align:right;color:${pct!==null?pctCol(pct):"var(--stone)"}">${pct!==null?pct+"%":"--"}</span>
      </div>`;
    }).join("")}
  </div>`;

  el.innerHTML=html;
}

startSync();
renderHome();
</script>
</body>
</html>
